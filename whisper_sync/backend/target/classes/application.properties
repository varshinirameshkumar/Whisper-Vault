spring.application.name=whispervault

spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://whisper_admin:WhisperPass123!@cluster0.t6mdt.mongodb.net/whispervault?retryWrites=true&w=majority&appName=Cluster0}

spring.mail.host=${EMAIL_HOST:smtp.gmail.com}
spring.mail.port=${EMAIL_PORT:587}
spring.mail.username=${EMAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${EMAIL_PASSWORD:your-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Security configuration
whispervault.jwtSecret=${JWT_SECRET:SecretKeyForWhisperVaultEphemeralMessagingApp2026!}
whispervault.jwtExpirationMs=86400000
whispervault.aesSecretKey=${AES_SECRET_KEY:ThisIsASecretKeyForAES256Encryption}

# Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# File upload

# Server
server.port=8080

# Frontend URL for email links
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Logging
logging.level.com.vault=DEBUG
# WebSocket / Group Room
app.room.max-messages=50
app.room.invite-token-expiry-minutes=30

# Redis (optional — falls back to ConcurrentHashMap if Redis unavailable)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# File upload (5MB for group chat file tunnels)

# File upload — encrypted payloads up to 8MB
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=8MB
